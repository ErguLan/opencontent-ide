name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check for branding leaks
        run: |
          echo "Checking for proprietary branding leaks..."
          if grep -rIl "Yoll\|TLUK\|HoneyCopper\|yollsite" src/ --include="*.js" --include="*.jsx" --include="*.json" --include="*.css" 2>/dev/null; then
            echo "ERROR: Proprietary branding found in source files!"
            exit 1
          fi
          echo "No branding leaks found."

      - name: Check for leaked secrets
        run: |
          echo "Checking for leaked API keys..."
          if grep -rIE "(sk-or-|AIza|sk-[a-zA-Z0-9]{20,})" src/ --include="*.js" --include="*.jsx" --include="*.json" 2>/dev/null; then
            echo "ERROR: Possible API key found in source!"
            exit 1
          fi
          echo "No leaked secrets found."
